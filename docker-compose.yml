version: '3.9'

services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL 15 with PostGIS 3.4
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: geofence_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: student_geofence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-apply schema on first run
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d student_geofence"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Redis 7 (for Socket.IO horizontal scaling adapter)
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: geofence_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Node.js Backend API + WebSocket Server
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geofence_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/student_geofence
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_TO_A_STRONG_SECRET_IN_PRODUCTION}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────
  # Next.js Admin Dashboard
  # ─────────────────────────────────────────────────────────────
  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: geofence_dashboard
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
